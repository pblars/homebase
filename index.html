<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Home Base</title>

  <!-- Config MUST load first — defines the global CONFIG used by all scripts -->
  <script src="config.js"></script>

  <!-- Base styles, then screen-specific styles (screens come in later phases) -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/sleep.css" />
  <link rel="stylesheet" href="styles/dashboard.css" />
  <link rel="stylesheet" href="styles/quest.css" />
  <link rel="stylesheet" href="styles/settings.css" />
</head>
<body>
  <!-- ====================================================================== -->
  <!-- Sky layer: two full-bleed <img> crossfaded by SkyManager.              -->
  <!-- #sky-a starts visible, #sky-b hidden. Manager swaps their opacity.     -->
  <!-- ====================================================================== -->
  <div id="sky-stage">
    <img id="sky-a" class="sky-layer" alt="" />
    <img id="sky-b" class="sky-layer" alt="" />
  </div>

  <!-- Off-screen image used to warm the cache for the next slot's art -->
  <img id="sky-preload" class="sky-preload" alt="" aria-hidden="true" />

  <!-- ====================================================================== -->
  <!-- Screen layer: screens mount on top of the sky in later phases.         -->
  <!-- ====================================================================== -->
  <div id="screen-root"></div>

  <!-- ====================================================================== -->
  <!-- Scripts, in dependency order.                                          -->
  <!--   utils -> data -> sky systems -> screens -> main                       -->
  <!-- ====================================================================== -->

  <!-- utils -->
  <script src="src/utils/store.js"></script>
  <script src="src/utils/api.js"></script>
  <script src="src/utils/router.js"></script>

  <!-- ui (icon library + shared nav bar; screens depend on these) -->
  <script src="src/ui/icons.js"></script>
  <script src="src/ui/NavBar.js"></script>

  <!-- data (static content consumed by screens) -->
  <script src="src/data/verses.js"></script>
  <script src="src/data/events.js"></script>
  <script src="src/data/rewards.js"></script>
  <script src="src/data/chores.js"></script>
  <script src="src/data/ChoreData.js"></script>
  <script src="src/data/SettingsData.js"></script>
  <script src="src/data/meals.js"></script>

  <!-- sky systems -->
  <script src="src/sky/TimeSystem.js"></script>
  <script src="src/sky/WeatherSystem.js"></script>
  <script src="src/sky/SkyManager.js"></script>

  <!-- quest + reward system -->
  <script src="src/quest/AcornAnimation.js"></script>
  <script src="src/quest/QuestStore.js"></script>
  <script src="src/quest/QuestSystem.js"></script>
  <script src="src/quest/QuestBanner.js"></script>
  <script src="src/quest/KidChorePanel.js"></script>
  <script src="src/quest/ChestCelebration.js"></script>

  <!-- screens (register themselves with the Router on load) -->
  <script src="src/screens/SleepScreen.js"></script>
  <script src="src/screens/Placeholders.js"></script>
  <script src="src/screens/SettingsScreen.js"></script>
  <script src="src/screens/Dashboard.js"></script>

  <!-- entry point -->
  <script src="src/main.js"></script>
</body>
</html>
