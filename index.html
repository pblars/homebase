<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Home Base</title>

  <!-- iPad kiosk: launch chrome-less full-screen when added to the Home Screen,
       let the sky bleed under the status bar, and stop iOS from linkifying the
       address in Settings. (Viewport-height, pinch-zoom, safe-area, and
       stay-awake handling live in src/utils/ios.js + styles/base.css.) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Home Base" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Boot guard — MUST stay first, and MUST stay ES5.
       Every script below is a classic <script>, so an uncaught error in any one
       of them halts the boot: no screen mounts and the tablet shows nothing but
       the body background. That is indistinguishable from a dead device, and
       Safari on an iPad has no console without a tethered Mac, so it can't be
       diagnosed in place. Paint the error on screen instead. Tap to dismiss. -->
  <script>
    (function () {
      function show(title, detail) {
        try {
          var el = document.getElementById('boot-error');
          if (!el) {
            el = document.createElement('div');
            el.id = 'boot-error';
            el.onclick = function () {
              if (el.parentNode) el.parentNode.removeChild(el);
            };
            (document.body || document.documentElement).appendChild(el);
          }
          el.style.cssText =
            'position:fixed;z-index:99999;left:0;right:0;top:0;max-height:60%;' +
            'overflow:auto;padding:16px 18px;background:rgba(122,28,28,0.97);' +
            'color:#fff;white-space:pre-wrap;word-break:break-word;' +
            'font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;';
          el.textContent =
            'Home Base failed to start\n(tap to dismiss)\n\n' + title + '\n' + detail;
        } catch (e) { /* the reporter must never throw */ }
      }
      window.addEventListener('error', function (e) {
        show(e.message || 'Script error',
             (e.filename || '') + (e.lineno ? ':' + e.lineno : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        show('Unhandled promise rejection', (r && (r.message || String(r))) || '');
      });
    })();
  </script>

  <!-- Legacy Safari shims — MUST stay before every script below, and stay ES5.
       The wall iPad runs an older iOS (~10.3–11.2) whose Safari predates a few
       things this app uses. A missing API throws at runtime, and because the boot
       is a chain of classic scripts, one throw blanks the whole screen. All
       feature-detected, so current browsers skip them entirely. -->
  <script>
    // Promise.prototype.finally — Safari 11.1 / iOS 11.3.
    // Used by QuestStore (clearing in-flight write count) and SettingsScreen
    // (re-enabling the Save button). Without it the dashboard never boots.
    if (typeof Promise === 'function' && !Promise.prototype['finally']) {
      Promise.prototype['finally'] = function (cb) {
        var P = this.constructor || Promise;
        return this.then(
          function (value) {
            return P.resolve(cb()).then(function () { return value; });
          },
          function (err) {
            return P.resolve(cb()).then(function () { throw err; });
          }
        );
      };
    }
  </script>

  <!-- Config MUST load first — defines the global CONFIG used by all scripts -->
  <script src="config.js"></script>

  <!-- Display serif (Newsreader) + humanist sans (Mulish) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&family=Newsreader:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Base styles, then screen-specific styles (screens come in later phases) -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/sleep.css" />
  <link rel="stylesheet" href="styles/dashboard.css" />
  <link rel="stylesheet" href="styles/quest.css" />
  <link rel="stylesheet" href="styles/glowjars.css" />
  <link rel="stylesheet" href="styles/settings.css" />
  <link rel="stylesheet" href="styles/calendar.css" />
  <link rel="stylesheet" href="styles/weather.css" />

  <!-- Leaflet (weather radar map). RainViewer radar tiles are drawn on this. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <!-- ====================================================================== -->
  <!-- Sky layer: two full-bleed <img> crossfaded by SkyManager.              -->
  <!-- #sky-a starts visible, #sky-b hidden. Manager swaps their opacity.     -->
  <!-- ====================================================================== -->
  <div id="sky-stage">
    <img id="sky-a" class="sky-layer" alt="" />
    <img id="sky-b" class="sky-layer" alt="" />
  </div>

  <!-- Off-screen image used to warm the cache for the next slot's art -->
  <img id="sky-preload" class="sky-preload" alt="" aria-hidden="true" />

  <!-- ====================================================================== -->
  <!-- Screen layer: screens mount on top of the sky in later phases.         -->
  <!-- ====================================================================== -->
  <div id="screen-root"></div>

  <!-- ====================================================================== -->
  <!-- Scripts, in dependency order.                                          -->
  <!--   utils -> data -> sky systems -> screens -> main                       -->
  <!-- ====================================================================== -->

  <!-- utils -->
  <script src="src/utils/diag.js"></script>
  <script src="src/utils/ios.js"></script>
  <script src="src/utils/store.js"></script>
  <script src="src/utils/IdleTimer.js"></script>
  <script src="src/utils/api.js"></script>
  <script src="src/utils/router.js"></script>

  <!-- ui (icon library + shared nav bar; screens depend on these) -->
  <script src="src/ui/icons.js"></script>
  <script src="src/ui/NavBar.js"></script>
  <script src="src/ui/Breadcrumb.js"></script>

  <!-- data (static content consumed by screens) -->
  <script src="src/data/verses.js"></script>
  <script src="src/data/events.js"></script>
  <script src="src/data/rewards.js"></script>
  <script src="src/data/chores.js"></script>
  <script src="src/data/ChoreData.js"></script>
  <script src="src/data/SettingsData.js"></script>
  <script src="src/data/CalendarSystem.js"></script>
  <script src="src/data/WeatherLocations.js"></script>
  <script src="src/data/meals.js"></script>
  <script src="src/data/MealsData.js"></script>

  <!-- sky systems -->
  <script src="src/sky/TimeSystem.js"></script>
  <script src="src/sky/WeatherSystem.js"></script>
  <script src="src/sky/SkyManager.js"></script>

  <!-- quest + reward system -->
  <script src="src/quest/AcornAnimation.js"></script>
  <script src="src/quest/QuestStore.js"></script>
  <script src="src/quest/QuestSystem.js"></script>
  <script src="src/quest/QuestBanner.js"></script>
  <script src="src/quest/KidChorePanel.js"></script>
  <script src="src/quest/GlowJarStore.js"></script>
  <script src="src/quest/FamilyGlowJarsCard.js"></script>
  <script src="src/quest/ChestCelebration.js"></script>

  <!-- screens (register themselves with the Router on load) -->
  <script src="src/screens/SleepScreen.js"></script>
  <script src="src/screens/Placeholders.js"></script>
  <script src="src/screens/MealsDetail.js"></script>
  <script src="src/screens/AddEventDialog.js"></script>
  <script src="src/screens/CalendarDetail.js"></script>
  <script src="src/screens/WeatherRadar.js"></script>
  <script src="src/screens/WeatherDetail.js"></script>
  <script src="src/screens/SettingsScreen.js"></script>
  <script src="src/screens/Dashboard.js"></script>

  <!-- entry point -->
  <script src="src/main.js"></script>
</body>
</html>
